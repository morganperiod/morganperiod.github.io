<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>morgan-sillycat.exe</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tiny5&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  width: 100%;
  min-height: 100%;
}

body {
  width: 100vw;
  min-height: 100dvh;
  overflow: hidden;
  padding: 10px;
  font-family: "Tiny5", monospace;
  background-color: #050517;
  background-image:
    url("https://i.pinimg.com/originals/e4/d2/c1/e4d2c1d0da356797359acd9270bcdd77.gif"),
    url("https://gifcity.carrd.co/assets/images/gallery62/9cee5530.gif?v=3fc8f5cd");
  background-repeat: repeat, repeat;
  animation: fallingStars 16s linear infinite;
}

@keyframes fallingStars {
  from { background-position: 0 0, 0 0; }
  to { background-position: 0 900px, 0 0; }
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,.06) 0,
    rgba(255,255,255,.06) 1px,
    transparent 1px,
    transparent 4px
  );
  opacity: .4;
}

.window {
  width: calc(100vw - 20px);
  height: calc(100dvh - 20px);
  display: flex;
  flex-direction: column;
  background: #c0c0c0;
  border: 3px solid #000;
  box-shadow: 6px 6px 0 #000, 11px 11px 0 #ff00ff;
  animation: rgbShadow 3s steps(1) infinite;
}

@keyframes rgbShadow {
  0% { box-shadow: 6px 6px 0 #000, 11px 11px 0 #ff00ff; }
  25% { box-shadow: 6px 6px 0 #000, 11px 11px 0 #00ffff; }
  50% { box-shadow: 6px 6px 0 #000, 11px 11px 0 #ffff00; }
  75% { box-shadow: 6px 6px 0 #000, 11px 11px 0 #00ff66; }
  100% { box-shadow: 6px 6px 0 #000, 11px 11px 0 #ff00ff; }
}

.titlebar {
  height: 38px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 4px 7px 4px 10px;
  color: white;
  background: linear-gradient(90deg, #001b83, #7b00ff, #ff8a00);
  border-bottom: 3px solid #000;
  font-size: clamp(1rem, 4vw, 1.5rem);
  text-shadow: 2px 2px #000;
}

.title {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.window-buttons {
  display: flex;
  gap: 5px;
  flex-shrink: 0;
}

.win-btn {
  width: 24px;
  height: 24px;
  display: grid;
  place-items: center;
  background: #c0c0c0;
  color: #000;
  border: 2px solid;
  border-color: #fff #555 #555 #fff;
  text-shadow: none;
}

.content {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  padding: clamp(8px, 2vw, 14px);
  border: 3px solid;
  border-color: #fff #555 #555 #fff;
  overflow: hidden;
}

.banner {
  flex-shrink: 0;
  background: #000;
  color: #ffd6ff;
  border: 2px dashed #ff00cc;
  padding: clamp(8px, 2vw, 12px);
  margin-bottom: clamp(8px, 2vw, 12px);
  font-size: clamp(1.05rem, 4.7vw, 1.9rem);
  text-align: center;
  line-height: 1.1;
  text-shadow: 2px 2px #6d00ff;
  overflow-wrap: anywhere;
}

.catbox {
  flex: 1;
  min-height: 0;
  display: grid;
  place-items: center;
  background: #111;
  border: 3px solid #000;
  padding: clamp(6px, 2vw, 10px);
}

.cat-frame {
  width: 100%;
  height: 100%;
  display: grid;
  place-items: center;
  overflow: hidden;
  background: #000;
  border: 2px solid #fff;
}

.cat-motion {
  max-width: 100%;
  max-height: 100%;
  display: grid;
  place-items: center;
}

#cat {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  transform-origin: center;
}

.toolbar {
  flex-shrink: 0;
  margin-top: clamp(8px, 2vw, 12px);
  display: grid;
  grid-template-columns: repeat(9, 1fr);
  gap: 8px;
}

button {
  min-width: 0;
  min-height: 42px;
  font: inherit;
  font-size: clamp(.9rem, 2.7vw, 1.25rem);
  border: 3px solid;
  border-color: #fff #555 #555 #fff;
  cursor: pointer;
  color: #000;
}

button:active {
  border-color: #555 #fff #fff #555;
  transform: translate(2px, 2px);
}

.pink { background: #ff4fd8; }
.blue { background: #40e8ff; }
.green { background: #70ff70; }
.orange { background: #ffb347; }
.purple { background: #b983ff; }
.yellow { background: #fff36a; }

.bounce { animation: bounce .45s steps(2) infinite alternate; }
@keyframes bounce {
  from { transform: translateY(0); }
  to { transform: translateY(-35px); }
}

.spin { animation: spin 1.1s linear infinite; }
@keyframes spin {
  to { transform: rotate(360deg); }
}

.vhs { animation: vhs .16s steps(2) infinite; }
@keyframes vhs {
  from { transform: translateX(-3px); }
  to { transform: translateX(3px); }
}

.flip { transform: scaleX(-1); }
.deepfried { filter: saturate(320%) contrast(190%) brightness(125%); }
.party { animation: party .35s steps(2) infinite alternate; }

@keyframes party {
  from { filter: hue-rotate(0deg) saturate(220%) contrast(130%); }
  to { filter: hue-rotate(220deg) saturate(360%) contrast(170%); }
}

.pixel {
  image-rendering: pixelated;
  width: 70%;
}

@media (max-width: 760px) {
  .toolbar {
    grid-template-columns: repeat(3, 1fr);
  }
}

@media (max-width: 430px) {
  body { padding: 7px; }

  .window {
    width: calc(100vw - 14px);
    height: calc(100dvh - 14px);
  }

  .titlebar {
    height: 34px;
  }

  .win-btn {
    width: 20px;
    height: 20px;
  }

  .toolbar {
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }

  button {
    min-height: 38px;
  }
}
</style>
</head>

<body>
<main class="window">
  <div class="titlebar">
    <div class="title">morgan-sillycat.exe</div>
    <div class="window-buttons">
      <div class="win-btn">_</div>
      <div class="win-btn">□</div>
      <div class="win-btn">×</div>
    </div>
  </div>

  <section class="content">
    <div class="banner" id="loginText"></div>

    <div class="catbox">
      <div class="cat-frame">
        <div class="cat-motion" id="catMotion">
          <img id="cat" alt="random cat gif">
        </div>
      </div>
    </div>

    <div class="toolbar">
      <button class="pink" onclick="randomCat()">new cat</button>
      <button class="blue" onclick="setMotion('bounce')">bounce</button>
      <button class="orange" onclick="setMotion('spin')">spin</button>
      <button class="purple" onclick="toggleCat('flip')">flip</button>
      <button class="yellow" onclick="toggleCat('deepfried')">fry</button>
      <button class="green" onclick="toggleCat('party')">party</button>
      <button class="blue" onclick="setMotion('vhs')">vhs</button>
      <button class="pink" onclick="toggleCat('pixel')">pixel</button>
      <button class="orange" onclick="resetEffects()">reset</button>
    </div>
  </section>
</main>

<script>
const params = new URLSearchParams(window.location.search);

const user = cleanText(params.get("user")) || "guest";
const keyid = cleanText(params.get("keyid")) || "";

document.getElementById("loginText").textContent =
  `˚₊‧꒰ა ✦ Logged in as: ${user} — Enjoy :3 ✦ ໒꒱ ‧₊˚`;

window.sillycatUser = user;
window.sillycatKeyId = keyid;

const cats = [
  "https://media.giphy.com/media/JIX9t2j0ZTN9S/giphy.gif",
  "https://media.giphy.com/media/mlvseq9yvZhba/giphy.gif",
  "https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif",
  "https://media.giphy.com/media/VbnUQpnihPSIgIXuZv/giphy.gif",
  "https://media.giphy.com/media/ICOgUNjpvO0PC/giphy.gif",
  "https://media.giphy.com/media/GeimqsH0TLDt4tScGw/giphy.gif"
];

const cat = document.getElementById("cat");
const motion = document.getElementById("catMotion");

let lastCat = "";
let currentMotion = "";

function cleanText(value) {
  if (!value) return "";
  return value.replace(/[<>]/g, "").trim().slice(0, 32);
}

function randomCat() {
  let pick = cats[Math.floor(Math.random() * cats.length)];

  if (cats.length > 1) {
    while (pick === lastCat) {
      pick = cats[Math.floor(Math.random() * cats.length)];
    }
  }

  lastCat = pick;
  cat.src = pick;
}

function setMotion(effect) {
  motion.classList.remove("bounce", "spin", "vhs");

  if (currentMotion === effect) {
    currentMotion = "";
    return;
  }

  currentMotion = effect;
  motion.classList.add(effect);
}

function toggleCat(effect) {
  cat.classList.toggle(effect);
}

function resetEffects() {
  motion.className = "cat-motion";
  cat.className = "";
  currentMotion = "";
}

randomCat();
</script>
</body>
</html>
