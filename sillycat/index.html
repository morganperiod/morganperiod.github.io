<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>sillycat.exe</title>

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  min-height: 100%;
}

body {
  min-height: 100vh;
  font-family: "Courier New", monospace;
  color: #111;
  display: grid;
  place-items: center;
  padding: 18px;

  background-color: #080822;
  background-image:
    radial-gradient(#ffffff 1px, transparent 1px),
    radial-gradient(#8df7ff 1px, transparent 1px),
    linear-gradient(45deg, transparent 48%, rgba(255,255,255,.08) 49%, rgba(255,255,255,.08) 51%, transparent 52%);
  background-size: 18px 18px, 36px 36px, 72px 72px;
  background-position: 0 0, 9px 9px, 0 0;
  image-rendering: pixelated;
}

.window {
  width: min(760px, 94vw);
  border: 3px solid #000;
  background: #c0c0c0;
  box-shadow:
    8px 8px 0 #000,
    12px 12px 0 rgba(255, 0, 180, .65);
}

.titlebar {
  height: 34px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 6px 0 10px;
  color: white;
  font-weight: bold;
  background: linear-gradient(90deg, #001f8f, #b000ff, #ff8a00);
  border-bottom: 3px solid #000;
}

.title {
  text-shadow: 2px 2px #000;
}

.buttons {
  display: flex;
  gap: 5px;
}

.btn {
  width: 22px;
  height: 22px;
  display: grid;
  place-items: center;
  background: #c0c0c0;
  color: #000;
  border: 2px solid;
  border-color: #fff #555 #555 #fff;
  font-size: 14px;
  line-height: 1;
}

.content {
  padding: 14px;
  border: 3px solid;
  border-color: #fff #555 #555 #fff;
}

.banner {
  background: #000;
  color: #00ff66;
  border: 2px dashed #ff00cc;
  padding: 10px;
  margin-bottom: 14px;
  font-size: clamp(1.1rem, 4vw, 2rem);
  text-align: center;
  text-transform: uppercase;
  letter-spacing: 2px;
}

.catbox {
  background: #111;
  border: 3px solid #000;
  padding: 10px;
}

img {
  display: block;
  width: 100%;
  max-height: 58vh;
  object-fit: contain;
  background: #000;
  border: 2px solid #fff;
}

.quote {
  margin: 12px 0 0;
  padding: 10px;
  background: #ffff99;
  border: 2px solid #000;
  font-size: clamp(.95rem, 3vw, 1.2rem);
  text-align: center;
}

.toolbar {
  margin-top: 14px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

button, a {
  font-family: inherit;
  font-weight: bold;
  font-size: 1rem;
  color: #000;
  background: #ffcc00;
  border: 3px solid;
  border-color: #fff #555 #555 #fff;
  padding: 8px 12px;
  text-decoration: none;
  cursor: pointer;
}

button:active, a:active {
  border-color: #555 #fff #fff #555;
  transform: translate(2px, 2px);
}

.marquee {
  margin-top: 12px;
  overflow: hidden;
  background: #000080;
  color: white;
  border: 2px solid #000;
  padding: 6px;
  white-space: nowrap;
}

.marquee span {
  display: inline-block;
  animation: scroll 12s linear infinite;
}

@keyframes scroll {
  from { transform: translateX(100%); }
  to { transform: translateX(-100%); }
}
</style>
</head>

<body>
  <main class="window">
    <div class="titlebar">
      <div class="title">sillycat.exe</div>
      <div class="buttons">
        <div class="btn">_</div>
        <div class="btn">□</div>
        <div class="btn">×</div>
      </div>
    </div>

    <section class="content">
      <div class="banner">★ silly cat zone ★</div>

      <div class="catbox">
        <img id="cat" alt="random cat gif">
        <p class="quote" id="quote"></p>
      </div>

      <div class="toolbar">
        <button onclick="randomCat()">new cat</button>
        <a href="/">home</a>
      </div>

      <div class="marquee">
        <span>☆ welcome to the silly cat zone ☆ best viewed on a tiny glowing screen ☆ no refunds ☆</span>
      </div>
    </section>
  </main>

<script>
const cats = [
  {
    gif: "https://media.giphy.com/media/JIX9t2j0ZTN9S/giphy.gif",
    quote: "the council has decided: more snacks."
  },
  {
    gif: "https://media.giphy.com/media/mlvseq9yvZhba/giphy.gif",
    quote: "no thoughts. only vibes."
  },
  {
    gif: "https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif",
    quote: "tiny criminal detected."
  },
  {
    gif: "https://media.giphy.com/media/VbnUQpnihPSIgIXuZv/giphy.gif",
    quote: "professional internet creature."
  }
];

function randomCat() {
  const pick = cats[Math.floor(Math.random() * cats.length)];
  document.getElementById("cat").src = pick.gif;
  document.getElementById("quote").textContent = `"${pick.quote}"`;
}

randomCat();
</script>
</body>
</html>
