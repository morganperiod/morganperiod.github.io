<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>sillycat.exe</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  min-height: 100%;
}

body {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 18px;
  overflow: hidden;
  font-family: "Press Start 2P", monospace;
  color: #111;

  background-image:
    url("https://gifcity.carrd.co/assets/images/gallery62/e626fe5a.png?v=3fc8f5cd"),
    url("https://gifcity.carrd.co/assets/images/gallery62/9cee5530.gif?v=3fc8f5cd");
  background-repeat: repeat, repeat;
  background-size: auto, auto;
  animation: fallingStars 18s linear infinite;
}

@keyframes fallingStars {
  from { background-position: 0 0, 0 0; }
  to { background-position: 0 900px, 0 0; }
}

.window {
  width: min(760px, 94vw);
  border: 3px solid #000;
  background: #c0c0c0;
  box-shadow:
    8px 8px 0 #000,
    14px 14px 0 #ff00ff;
  animation: rgbShadow 3s linear infinite;
}

@keyframes rgbShadow {
  0% {
    box-shadow: 8px 8px 0 #000, 14px 14px 0 #ff00ff;
  }
  33% {
    box-shadow: 8px 8px 0 #000, 14px 14px 0 #00ffff;
  }
  66% {
    box-shadow: 8px 8px 0 #000, 14px 14px 0 #ffff00;
  }
  100% {
    box-shadow: 8px 8px 0 #000, 14px 14px 0 #ff00ff;
  }
}

.titlebar {
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 6px 0 10px;
  color: white;
  background: linear-gradient(90deg, #001f8f, #b000ff, #ff8a00);
  border-bottom: 3px solid #000;
  font-size: .75rem;
}

.title {
  text-shadow: 2px 2px #000;
}

.buttons {
  display: flex;
  gap: 5px;
}

.btn {
  width: 22px;
  height: 22px;
  display: grid;
  place-items: center;
  background: #c0c0c0;
  color: #000;
  border: 2px solid;
  border-color: #fff #555 #555 #fff;
  font-size: 10px;
}

.content {
  padding: 14px;
  border: 3px solid;
  border-color: #fff #555 #555 #fff;
}

.banner {
  background: #000;
  color: #00ff66;
  border: 2px dashed #ff00cc;
  padding: 12px;
  margin-bottom: 14px;
  font-size: clamp(.8rem, 3vw, 1.3rem);
  text-align: center;
  line-height: 1.7;
  text-shadow: 2px 2px #003b18;
}

.catbox {
  background: #111;
  border: 3px solid #000;
  padding: 10px;
}

img {
  display: block;
  width: 100%;
  max-height: 58vh;
  object-fit: contain;
  background: #000;
  border: 2px solid #fff;
}

.quote {
  margin: 12px 0 0;
  padding: 12px;
  background: #ffff99;
  border: 2px solid #000;
  font-size: clamp(.65rem, 2.3vw, .9rem);
  line-height: 1.8;
  text-align: center;
}

.toolbar {
  margin-top: 14px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(135px, 1fr));
  gap: 10px;
}

button {
  font-family: inherit;
  font-size: .65rem;
  color: #000;
  border: 3px solid;
  border-color: #fff #555 #555 #fff;
  padding: 10px 8px;
  cursor: pointer;
}

button:active {
  border-color: #555 #fff #fff #555;
  transform: translate(2px, 2px);
}

.pink { background: #ff66cc; }
.blue { background: #66ddff; }
.green { background: #77ff77; }
.orange { background: #ffb347; }
.purple { background: #b983ff; }

.marquee {
  margin-top: 12px;
  overflow: hidden;
  background: #000080;
  color: white;
  border: 2px solid #000;
  padding: 8px;
  white-space: nowrap;
  font-size: .65rem;
}

.marquee span {
  display: inline-block;
  animation: scroll 12s linear infinite;
}

@keyframes scroll {
  from { transform: translateX(100%); }
  to { transform: translateX(-100%); }
}

/* silly effects */
.bounce {
  animation: bounce .55s infinite alternate;
}

@keyframes bounce {
  from { transform: translateY(0); }
  to { transform: translateY(-25px); }
}

.shake {
  animation: shake .12s infinite;
}

@keyframes shake {
  0% { transform: translate(0, 0) rotate(0deg); }
  25% { transform: translate(6px, -4px) rotate(2deg); }
  50% { transform: translate(-5px, 5px) rotate(-2deg); }
  75% { transform: translate(4px, 3px) rotate(1deg); }
  100% { transform: translate(0, 0) rotate(0deg); }
}

.spin {
  animation: spin 1.2s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.flip {
  transform: scaleX(-1);
}

.deepfried {
  filter: saturate(280%) contrast(180%) brightness(120%);
}

@media(max-width: 600px) {
  .titlebar {
    font-size: .55rem;
  }

  .toolbar {
    grid-template-columns: 1fr 1fr;
  }

  button {
    font-size: .55rem;
  }
}
</style>
</head>

<body>
  <main class="window">
    <div class="titlebar">
      <div class="title">sillycat.exe</div>
      <div class="buttons">
        <div class="btn">_</div>
        <div class="btn">□</div>
        <div class="btn">×</div>
      </div>
    </div>

    <section class="content">
      <div class="banner">★ silly cat zone ★</div>

      <div class="catbox">
        <img id="cat" alt="random cat gif">
        <p class="quote" id="quote"></p>
      </div>

      <div class="toolbar">
        <button class="pink" onclick="randomCat()">new cat</button>
        <button class="blue" onclick="toggleEffect('bounce')">bounce</button>
        <button class="green" onclick="toggleEffect('shake')">shake</button>
        <button class="orange" onclick="toggleEffect('spin')">spin</button>
        <button class="purple" onclick="toggleEffect('flip')">flip</button>
        <button class="pink" onclick="toggleEffect('deepfried')">deep fry</button>
      </div>

      <div class="marquee">
        <span>☆ welcome to the silly cat zone ☆ best viewed on a haunted computer ☆ no refunds ☆</span>
      </div>
    </section>
  </main>

<script>
const cats = [
  {
    gif: "https://media.giphy.com/media/JIX9t2j0ZTN9S/giphy.gif",
    quote: "the council has decided: more snacks."
  },
  {
    gif: "https://media.giphy.com/media/mlvseq9yvZhba/giphy.gif",
    quote: "no thoughts. only vibes."
  },
  {
    gif: "https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif",
    quote: "tiny criminal detected."
  },
  {
    gif: "https://media.giphy.com/media/VbnUQpnihPSIgIXuZv/giphy.gif",
    quote: "professional internet creature."
  }
];

const cat = document.getElementById("cat");
const quote = document.getElementById("quote");

function randomCat() {
  const pick = cats[Math.floor(Math.random() * cats.length)];
  cat.src = pick.gif;
  quote.textContent = `"${pick.quote}"`;
}

function toggleEffect(effect) {
  cat.classList.toggle(effect);
}

randomCat();
</script>
</body>
</html>
