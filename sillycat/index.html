<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Silly Cat</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:Inter,sans-serif;

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;

    background:
    radial-gradient(circle at 20% 20%,#ff4fd8 0,#0000 28%),
    radial-gradient(circle at 80% 25%,#00d0ff 0,#0000 32%),
    radial-gradient(circle at 30% 80%,#ffd84d 0,#0000 26%),
    radial-gradient(circle at 90% 90%,#7d4dff 0,#0000 32%),
    #17143b;

}

body::before{

content:"";

position:fixed;

inset:0;

background:
linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),
linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);

background-size:40px 40px;

pointer-events:none;

}

main{

width:min(900px,92vw);

background:#101018;

border:2px solid #2b2f52;

border-radius:18px;

box-shadow:
0 25px 70px rgba(0,0,0,.55);

padding:40px;

}

header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:30px;

}

.logo{

font-size:2.5rem;

font-weight:800;

color:white;

}

.logo span{

color:#ffb400;

}

.tag{

color:#8aa0ff;

font-size:.9rem;

}

img{

display:block;

width:100%;

border-radius:12px;

margin-bottom:25px;

background:#222;

}

.quote{

font-size:1.3rem;

text-align:center;

color:#d9d9ff;

font-style:italic;

}

footer{

margin-top:30px;

display:flex;

justify-content:center;

}

button{

padding:12px 20px;

font-size:1rem;

font-weight:600;

border:none;

border-radius:10px;

cursor:pointer;

background:#ffb400;

transition:.2s;

}

button:hover{

transform:translateY(-2px);

}

@media(max-width:700px){

main{

padding:24px;

}

.logo{

font-size:2rem;

}

.quote{

font-size:1.05rem;

}

}

</style>

</head>

<body>

<main>

<header>

<div class="logo">
<span>■</span> silly cat
</div>

<div class="tag">
daily internet nonsense
</div>

</header>

<img id="cat">

<p class="quote" id="quote"></p>

<footer>

<button onclick="randomCat()">
Another Cat
</button>

</footer>

</main>

<script>

const cats=[

{
gif:"https://media.giphy.com/media/JIX9t2j0ZTN9S/giphy.gif",
quote:"the council has decided: more snacks."
},

{
gif:"https://media.giphy.com/media/mlvseq9yvZhba/giphy.gif",
quote:"today is legally a cat day."
},

{
gif:"https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif",
quote:"certified little menace."
},

{
gif:"https://media.giphy.com/media/VbnUQpnihPSIgIXuZv/giphy.gif",
quote:"absolutely no thoughts."
}

];

function randomCat(){

const c=cats[Math.floor(Math.random()*cats.length)];

document.getElementById("cat").src=c.gif;

document.getElementById("quote").textContent=c.quote;

}

randomCat();

</script>

</body>
</html>
