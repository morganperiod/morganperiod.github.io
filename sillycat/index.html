<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>morgan-sillycat.exe</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tiny5&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  width: 100%;
  min-height: 100%;
}

body {
  width: 100vw;
  min-height: 100dvh;
  overflow: hidden;
  padding: 18px;
  display: grid;
  place-items: center;
  font-family: "Tiny5", monospace;
  background-color: #050517;
  background-image:
    url("https://i.pinimg.com/originals/e4/d2/c1/e4d2c1d0da356797359acd9270bcdd77.gif"),
    url("https://gifcity.carrd.co/assets/images/gallery62/9cee5530.gif?v=3fc8f5cd");
  background-repeat: repeat, repeat;
  animation: fallingStars 16s linear infinite;
}

@keyframes fallingStars {
  from { background-position: 0 0, 0 0; }
  to { background-position: 0 900px, 0 0; }
}

.window {
  width: min(88vw, 980px);
  height: min(82dvh, 760px);
  display: flex;
  flex-direction: column;
  background: #c0c0c0;
  border: 3px solid #000;
  box-shadow: 7px 7px 0 #000, 13px 13px 0 #ff00ff;
  animation: rgbShadow 3s steps(1) infinite;
}

@keyframes rgbShadow {
  0% { box-shadow: 7px 7px 0 #000, 13px 13px 0 #ff00ff; }
  25% { box-shadow: 7px 7px 0 #000, 13px 13px 0 #00ffff; }
  50% { box-shadow: 7px 7px 0 #000, 13px 13px 0 #ffff00; }
  75% { box-shadow: 7px 7px 0 #000, 13px 13px 0 #00ff66; }
  100% { box-shadow: 7px 7px 0 #000, 13px 13px 0 #ff00ff; }
}

.titlebar {
  height: 36px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 7px 4px 10px;
  color: white;
  background: linear-gradient(90deg, #001b83, #7b00ff, #ff8a00);
  border-bottom: 3px solid #000;
  font-size: clamp(1rem, 3vw, 1.35rem);
  text-shadow: 2px 2px #000;
}

.title {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.window-buttons {
  display: flex;
  gap: 5px;
  flex-shrink: 0;
}

.win-btn {
  width: 22px;
  height: 22px;
  display: grid;
  place-items: center;
  background: #c0c0c0;
  color: #000;
  border: 2px solid;
  border-color: #fff #555 #555 #fff;
  text-shadow: none;
}

.content {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  padding: 10px;
  border: 3px solid;
  border-color: #fff #555 #555 #fff;
  overflow: hidden;
}

.banner {
  flex-shrink: 0;
  background: #000;
  color: #ffd6ff;
  border: 2px dashed #ff00cc;
  padding: 10px;
  margin-bottom: 10px;
  font-size: clamp(1.1rem, 3.5vw, 1.8rem);
  text-align: center;
  line-height: 1.1;
  text-shadow: 2px 2px #6d00ff;
  overflow-wrap: anywhere;
}

.catbox {
  flex: 1;
  min-height: 0;
  display: grid;
  place-items: center;
  background: #111;
  border: 3px solid #000;
  padding: 8px;
}

.cat-frame {
  width: 100%;
  height: 100%;
  display: grid;
  place-items: center;
  overflow: hidden;
  border: 2px solid #fff;
  background-color: #080808;
  background-image:
    linear-gradient(45deg, #0d0d0d 25%, transparent 25%),
    linear-gradient(-45deg, #0d0d0d 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #0d0d0d 75%),
    linear-gradient(-45deg, transparent 75%, #0d0d0d 75%);
  background-size: 96px 96px;
  background-position:
    0 0,
    0 48px,
    48px -48px,
    -48px 0px;
  animation: idleDiamondBg 18s linear infinite;
}

@keyframes idleDiamondBg {
  from {
    background-position:
      0 0,
      0 48px,
      48px -48px,
      -48px 0px;
  }

  to {
    background-position:
      -96px -96px,
      -96px -48px,
      -48px -144px,
      -144px -96px;
  }
}

.cat-motion {
  width: 100%;
  height: 100%;
  display: grid;
  place-items: center;
}

#cat {
  width: 100%;
  height: 100%;
  object-fit: contain;
  transform-origin: center;
}

#pixelCanvas {
  display: none;
  max-width: 100%;
  max-height: 100%;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  transform-origin: center;
}

.pixel-mode #cat {
  display: none;
}

.pixel-mode #pixelCanvas {
  display: block;
}

.toolbar {
  flex-shrink: 0;
  margin-top: 10px;
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 8px;
}

button {
  min-width: 0;
  min-height: 38px;
  font: inherit;
  font-size: clamp(.9rem, 2.2vw, 1.15rem);
  border: 3px solid;
  border-color: #fff #555 #555 #fff;
  cursor: pointer;
  color: #000;
}

button:active {
  border-color: #555 #fff #fff #555;
  transform: translate(2px, 2px);
}

.pink { background: #ff4fd8; }
.blue { background: #40e8ff; }
.green { background: #70ff70; }
.orange { background: #ffb347; }
.purple { background: #b983ff; }
.yellow { background: #fff36a; }

.bounce {
  animation: bounce .42s cubic-bezier(.2, .9, .25, 1.35) infinite;
}

@keyframes bounce {
  0%   { transform: translateY(0) scaleX(1.06) scaleY(.92); }
  20%  { transform: translateY(-12px) scaleX(.98) scaleY(1.04); }
  55%  { transform: translateY(-48px) scaleX(1) scaleY(1); }
  80%  { transform: translateY(-12px) scaleX(.98) scaleY(1.04); }
  100% { transform: translateY(0) scaleX(1.08) scaleY(.9); }
}

.spin {
  animation: spin 1.1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.flip { transform: scaleX(-1); }

.deepfried {
  filter: saturate(340%) contrast(200%) brightness(125%);
}

.party {
  animation: party .35s steps(2) infinite alternate;
}

@keyframes party {
  from { filter: hue-rotate(0deg) saturate(230%) contrast(135%); }
  to { filter: hue-rotate(220deg) saturate(380%) contrast(175%); }
}

@media (max-width: 760px) {
  body { padding: 14px; }

  .window {
    width: 92vw;
    height: 86dvh;
  }

  .toolbar {
    grid-template-columns: repeat(4, 1fr);
  }
}

@media (max-width: 430px) {
  body { padding: 12px; }

  .window {
    width: calc(100vw - 24px);
    height: calc(100dvh - 24px);
  }

  .titlebar { height: 34px; }

  .win-btn {
    width: 20px;
    height: 20px;
  }

  .toolbar {
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }

  button { min-height: 36px; }
}
</style>
</head>

<body>
<main class="window">
  <div class="titlebar">
    <div class="title">morgan-sillycat.exe</div>
    <div class="window-buttons">
      <div class="win-btn">_</div>
      <div class="win-btn">□</div>
      <div class="win-btn">×</div>
    </div>
  </div>

  <section class="content">
    <div class="banner" id="loginText"></div>

    <div class="catbox">
      <div class="cat-frame" id="catFrame">
        <div class="cat-motion" id="catMotion">
          <img id="cat" alt="random cat gif">
          <canvas id="pixelCanvas"></canvas>
        </div>
      </div>
    </div>

    <div class="toolbar">
      <button class="pink" onclick="randomCat()">new</button>
      <button class="blue" onclick="setMotion('bounce')">bounce</button>
      <button class="orange" onclick="setMotion('spin')">spin</button>
      <button class="purple" onclick="toggleCat('flip')">flip</button>
      <button class="yellow" onclick="toggleCat('deepfried')">fry</button>
      <button class="green" onclick="toggleCat('party')">party</button>
      <button class="pink" onclick="togglePixel()">pixel</button>
      <button class="orange" onclick="resetEffects()">reset</button>
    </div>
  </section>
</main>

<script>
const params = new URLSearchParams(window.location.search);

const user = cleanText(params.get("user")) || "guest";
const keyid = cleanText(params.get("keyid")) || "";

document.getElementById("loginText").textContent =
  `˚₊‧꒰ა ✦ Logged in as: ${user} — Enjoy :3 ✦ ໒꒱ ‧₊˚`;

window.sillycatUser = user;
window.sillycatKeyId = keyid;

const cats = [
  "https://media.giphy.com/media/JIX9t2j0ZTN9S/giphy.gif",
  "https://media.giphy.com/media/mlvseq9yvZhba/giphy.gif",
  "https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif",
  "https://media.giphy.com/media/VbnUQpnihPSIgIXuZv/giphy.gif",
  "https://media.giphy.com/media/ICOgUNjpvO0PC/giphy.gif",
  "https://media.giphy.com/media/GeimqsH0TLDt4tScGw/giphy.gif"
];

const cat = document.getElementById("cat");
const catFrame = document.getElementById("catFrame");
const motion = document.getElementById("catMotion");
const pixelCanvas = document.getElementById("pixelCanvas");
const pixelCtx = pixelCanvas.getContext("2d");

let lastCat = "";
let currentMotion = "";
let pixelOn = false;
let pixelLoop = null;
let pixelStart = 0;
let tempCanvas = document.createElement("canvas");
let tempCtx = tempCanvas.getContext("2d");

function cleanText(value) {
  if (!value) return "";
  return value.replace(/[<>]/g, "").trim().slice(0, 32);
}

function randomCat() {
  let pick = cats[Math.floor(Math.random() * cats.length)];

  if (cats.length > 1) {
    while (pick === lastCat) {
      pick = cats[Math.floor(Math.random() * cats.length)];
    }
  }

  lastCat = pick;
  cat.crossOrigin = "anonymous";
  cat.src = pick;
}

cat.addEventListener("load", () => {
  if (pixelOn) startPixelLoop();
});

function setMotion(effect) {
  motion.classList.remove("bounce", "spin");

  if (currentMotion === effect) {
    currentMotion = "";
    return;
  }

  currentMotion = effect;
  motion.classList.add(effect);
}

function toggleCat(effect) {
  cat.classList.toggle(effect);
  pixelCanvas.classList.toggle(effect);
}

function togglePixel() {
  pixelOn = !pixelOn;
  motion.classList.toggle("pixel-mode", pixelOn);

  if (pixelOn) {
    startPixelLoop();
  } else {
    stopPixelLoop();
  }
}

function getContainedSize() {
  const frame = catFrame.getBoundingClientRect();
  const naturalW = cat.naturalWidth || frame.width;
  const naturalH = cat.naturalHeight || frame.height;

  const scale = Math.min(frame.width / naturalW, frame.height / naturalH);
  const displayW = Math.max(1, Math.round(naturalW * scale));
  const displayH = Math.max(1, Math.round(naturalH * scale));

  return { displayW, displayH };
}

function startPixelLoop() {
  stopPixelLoop();
  pixelStart = performance.now();

  function draw(now) {
    if (!pixelOn) return;

    if (!cat.complete || !cat.naturalWidth || !cat.naturalHeight) {
      pixelLoop = requestAnimationFrame(draw);
      return;
    }

    const { displayW, displayH } = getContainedSize();
    const dpr = window.devicePixelRatio || 1;

    pixelCanvas.style.width = `${displayW}px`;
    pixelCanvas.style.height = `${displayH}px`;
    pixelCanvas.width = Math.round(displayW * dpr);
    pixelCanvas.height = Math.round(displayH * dpr);

    const wave = (Math.sin((now - pixelStart) / 450) + 1) / 2;
    const pixelSize = Math.round(8 + wave * 34);

    const lowW = Math.max(6, Math.round(displayW / pixelSize));
    const lowH = Math.max(6, Math.round(displayH / pixelSize));

    tempCanvas.width = lowW;
    tempCanvas.height = lowH;

    pixelCtx.imageSmoothingEnabled = false;
    tempCtx.imageSmoothingEnabled = false;

    pixelCtx.clearRect(0, 0, pixelCanvas.width, pixelCanvas.height);
    tempCtx.clearRect(0, 0, tempCanvas.width, tempCanvas.height);

    try {
      tempCtx.drawImage(cat, 0, 0, lowW, lowH);
      pixelCtx.drawImage(
        tempCanvas,
        0,
        0,
        lowW,
        lowH,
        0,
        0,
        pixelCanvas.width,
        pixelCanvas.height
      );
    } catch (error) {
      pixelOn = false;
      motion.classList.remove("pixel-mode");
      stopPixelLoop();
      return;
    }

    pixelLoop = requestAnimationFrame(draw);
  }

  pixelLoop = requestAnimationFrame(draw);
}

function stopPixelLoop() {
  if (pixelLoop) {
    cancelAnimationFrame(pixelLoop);
    pixelLoop = null;
  }
}

function resetEffects() {
  motion.className = "cat-motion";
  cat.className = "";
  pixelCanvas.className = "";
  currentMotion = "";
  pixelOn = false;
  pixelCanvas.removeAttribute("style");
  stopPixelLoop();
}

window.addEventListener("resize", () => {
  if (pixelOn) startPixelLoop();
});

randomCat();
</script>
</body>
</html>
